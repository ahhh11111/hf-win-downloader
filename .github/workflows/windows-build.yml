name: Windows Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows portable exe
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run smoke tests
        run: npm run smoke

      - name: Build portable exe
        run: npm run build:win

      - name: Create checksum
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path dist -Filter "*-portable.exe" | Select-Object -First 1
          if (-not $exe) {
            throw "No portable exe found in dist."
          }

          $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $exe.FullName).Hash.ToLowerInvariant()
          Set-Content -LiteralPath "$($exe.FullName).sha256" -Value "$hash  $($exe.Name)" -Encoding ascii

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: hf-downloader-windows-x64-portable
          path: |
            dist/*-portable.exe
            dist/*-portable.exe.sha256
          if-no-files-found: error

      - name: Upload exe to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" dist/*-portable.exe dist/*-portable.exe.sha256 --clobber
