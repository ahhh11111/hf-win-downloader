name: Windows Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    name: Build Windows portable exe
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run smoke tests
        run: npm run smoke

      - name: Build portable exe
        run: npm run build:win

      - name: Create checksum
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path dist -Filter "*-portable.exe" | Select-Object -First 1
          if (-not $exe) {
            throw "No portable exe found in dist."
          }

          $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $exe.FullName).Hash.ToLowerInvariant()
          Set-Content -LiteralPath "$($exe.FullName).sha256" -Value "$hash  $($exe.Name)" -Encoding ascii

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: hf-downloader-windows-x64-portable
          path: |
            dist/*-portable.exe
            dist/*-portable.exe.sha256
          if-no-files-found: error

      - name: Create or update GitHub release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $title = "HF Downloader $tag"

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag dist/*-portable.exe dist/*-portable.exe.sha256 --clobber
          } else {
            gh release create $tag dist/*-portable.exe dist/*-portable.exe.sha256 --title $title --generate-notes
          }
